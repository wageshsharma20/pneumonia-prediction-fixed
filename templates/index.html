<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Engine | Wagesh Sharma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Playfair+Display:opsz,wght@5..1200,400;5..1200,600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="layout-grid">
    <header class="masthead">
      <h1 class="headline-primary">PNEUMONIA<br>ANALYSIS</h1>
      <div class="divider-ultra"></div>
    </header>

    <section class="interaction-zone">
      <form id="predictionForm" class="upload-form" style="max-width: 100%;">
        <div class="input-grid">
          <div class="feature-item">
            <label class="mono-label">FEVER</label>
            <select name="fever" class="minimal-select">
              <option value="No">NO</option>
              <option value="Yes">YES</option>
            </select>
          </div>
          <div class="feature-item">
            <label class="mono-label">TACHYCARDIA</label>
            <select name="tachycardia" class="minimal-select">
              <option value="No">NO</option>
              <option value="Yes">YES</option>
            </select>
          </div>
          <div class="feature-item">
            <label class="mono-label">CRACKLES (LUNG SOUND)</label>
            <select name="crackles" class="minimal-select">
              <option value="No">NO</option>
              <option value="Yes">YES</option>
            </select>
          </div>
          <div class="feature-item">
            <label class="mono-label">X-RAY RESULT</label>
            <select name="xray_result" class="minimal-select">
              <option value="Consolidation">CONSOLIDATION</option>
              <option value="Effusion">EFFUSION</option>
              <option value="Infiltrate">INFILTRATE</option>
              <option value="Normal">NORMAL</option>
              <option value="Opacity">OPACITY</option>
            </select>
          </div>
          <div class="feature-item">
            <label class="mono-label">OXYGEN SATURATION (SpO₂ %)</label>
            <input type="number" name="oxygen_saturation" value="98" min="50" max="100" class="minimal-input">
          </div>
          <div class="feature-item">
            <label class="mono-label">WBC COUNT (cells/mcL)</label>
            <input type="number" name="wbc_count" value="8000" min="1000" max="50000" class="minimal-input">
          </div>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; max-width: 32rem;">EXECUTE ANALYSIS</button>
      </form>
    </section>

    <section id="result-container" class="results-zone">
      </section>
  </main>

  <script>
    document.getElementById('predictionForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const resultContainer = document.getElementById('result-container');
      
      resultContainer.style.display = 'block';
      resultContainer.innerHTML = '<p class="mono-label">PROCESSING TELEMETRY...</p>';

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.success) {
          resultContainer.innerHTML = `
            <div class="result-card inverted">
              <h2 class="headline-secondary">DIAGNOSIS</h2>
              <div class="feature-grid">
                <div class="feature-item">
                  <span class="mono-label">CLASSIFICATION</span>
                  <span class="serif-value">${result.prediction.toUpperCase()}</span>
                </div>
                <div class="feature-item">
                  <span class="mono-label">PROBABILITY</span>
                  <span class="serif-value">${result.probability}</span>
                </div>
              </div>
            </div>
          `;
        } else {
          resultContainer.innerHTML = `<p class="mono-label">ERROR: ${result.error}</p>`;
        }
      } catch (err) {
        resultContainer.innerHTML = `<p class="mono-label">SYSTEM FAILURE. UNABLE TO CONNECT.</p>`;
      }
    });
  </script>
</body>
</html>
